name: Build and Deploy

# Run on pushes and pull requests targeting any branch
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Grant execute permission for Gradle wrapper
        run: cd android && chmod +x ./gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xkb1

      - name: Install calibration dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r calibration-editor/requirements.txt

      - name: Run calibration application
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          cd calibration-editor
          ./run.sh

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MissionTrackerMap-debug-apk
          path: android/app/build/outputs/apk/debug/MissionTrackerMap-debug.apk

      - name: Upload Calibration Editor Package
        uses: actions/upload-artifact@v4
        with:
          name: calibration-editor
          path: calibration-editor/
