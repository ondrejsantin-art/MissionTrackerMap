name: Android MVP CI

# Run on pushes to the new branch (and pull‑requests targeting it)
on:
  push:
    branches: [ 1-android-app-mvp ]
  pull_request:
    branches: [ 1-android-app-mvp ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Grant execute permission for Gradle wrapper
        run: cd android && chmod +x ./gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

- name: Set up Python
  uses: actions/setup-python@v4
  with:
    python-version: '3.10'

- name: Install calibration dependencies
  run: |
    python -m pip install --upgrade pip
    pip install -r calibration-editor/requirements.txt

- name: Run calibration application
  run: |
    cd calibration-editor
    ./run.sh
